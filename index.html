<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Simulador de Auditoria Housekeeping – Fahrwerk</title>
<style>
:root{
  --vw-dark:#001E50; --vw-blue:#0040C1; --bg:#1a1a2e;
  --green:#00c853; --yellow:#ffd600; --orange:#ff9100; --red:#d50000;
  --card:#22224a; --card2:#2a2a55; --text:#eef1f8; --muted:#9aa3c7;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:40px}
header{background:linear-gradient(135deg,var(--vw-dark),var(--vw-blue));padding:14px 16px;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(0,0,0,.4)}
header h1{font-size:1.05rem;display:flex;align-items:center;gap:8px}
.hsub{display:flex;justify-content:space-between;align-items:center;margin-top:4px;font-size:.75rem;color:#cfd8ff}
.container{max-width:760px;margin:0 auto;padding:14px}
.card{background:var(--card);border-radius:12px;padding:14px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:12px}
.kpi{background:var(--card);border-radius:12px;padding:12px;text-align:center}
.kpi .ic{font-size:1.3rem}
.kpi .val{font-size:1.5rem;font-weight:700;margin-top:2px}
.kpi .lbl{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.btn{display:block;width:100%;border:none;border-radius:10px;padding:13px;font-size:.95rem;font-weight:600;cursor:pointer;color:#fff;font-family:inherit;margin-bottom:10px}
.btn-primary{background:linear-gradient(135deg,var(--vw-blue),#0055ff)}
.btn-dark{background:#141432;border:1px solid #3a3a70}
.btn-green{background:var(--green);color:#00300f}
.btn-purple{background:linear-gradient(135deg,#6a1b9a,#8e24aa)}
.btn-red{background:var(--red)}
.btn:active{transform:scale(.98)}
.row{display:flex;gap:10px}
.row .btn{flex:1}
input[type=text],select,textarea{width:100%;background:#141432;border:1px solid #3a3a70;border-radius:8px;color:var(--text);padding:11px;font-size:.95rem;font-family:inherit;margin-bottom:10px}
textarea{resize:vertical;min-height:70px}
label.f{display:block;font-size:.75rem;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.cat-title{display:flex;align-items:center;gap:8px;font-size:.95rem;font-weight:700;margin:16px 0 8px;color:#cfd8ff}
.cat-title .bar{flex:1;height:2px;background:#3a3a70;border-radius:2px}
.item{background:var(--card);border-radius:10px;padding:12px;margin-bottom:8px}
.item .nm{font-size:.9rem;font-weight:600;margin-bottom:8px}
.opts{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.qtyrow{display:flex;align-items:center;gap:10px}
.qbtn{width:44px;height:44px;border-radius:10px;border:1px solid #3a3a70;background:#141432;color:var(--text);font-size:1.4rem;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0;line-height:1}
.qbtn:active{transform:scale(.94)}
.qval{width:52px;text-align:center;font-size:1.5rem;font-weight:800;font-variant-numeric:tabular-nums}
.qlbl{flex:1;text-align:center;border-radius:8px;padding:9px 4px;font-size:.78rem;font-weight:600;border:1px solid #3a3a70;background:#141432;color:var(--muted)}
.qlbl.sel-0{background:#003d1a;border-color:var(--green);color:#b9f6ca}
.qlbl.sel-2{background:#3d3a00;border-color:var(--yellow);color:#fff59d}
.qlbl.sel-5{background:#3d2600;border-color:var(--orange);color:#ffcc80}
.qlbl.sel-10{background:#3d0000;border-color:var(--red);color:#ff8a80}
.opt{border:1px solid #3a3a70;background:#141432;border-radius:8px;padding:8px 2px;text-align:center;font-size:.68rem;cursor:pointer;color:var(--muted);font-family:inherit;line-height:1.25}
.opt b{display:block;font-size:.78rem;color:var(--text)}
.opt.sel-0{background:#003d1a;border-color:var(--green);color:#b9f6ca}
.opt.sel-0 b{color:var(--green)}
.opt.sel-2{background:#3d3a00;border-color:var(--yellow)}
.opt.sel-2 b{color:var(--yellow)}
.opt.sel-5{background:#3d2600;border-color:var(--orange)}
.opt.sel-5 b{color:var(--orange)}
.opt.sel-10{background:#3d0000;border-color:var(--red)}
.opt.sel-10 b{color:#ff8a80}
.progressbar{height:8px;background:#141432;border-radius:4px;overflow:hidden;margin:8px 0}
.progressbar>div{height:100%;background:var(--vw-blue);transition:width .3s}
.scorehead{position:sticky;top:64px;z-index:40;background:var(--bg);padding:8px 0 4px}
.scorepill{display:flex;justify-content:space-between;align-items:center;background:var(--card2);border-radius:10px;padding:10px 14px;font-size:.85rem}
.scorepill .sc{font-size:1.3rem;font-weight:800}
.sem{width:14px;height:14px;border-radius:50%;display:inline-block;margin-right:6px;vertical-align:-2px}
.result-big{text-align:center;padding:22px 14px}
.result-big .pts{font-size:3.4rem;font-weight:800;line-height:1}
.result-big .cls{font-size:1.15rem;font-weight:700;margin-top:8px}
.result-big .desc{font-size:.85rem;color:var(--muted);margin-top:6px}
.radio-line,.check-line{display:flex;align-items:center;gap:10px;padding:9px 10px;background:#141432;border:1px solid #3a3a70;border-radius:8px;margin-bottom:6px;cursor:pointer;font-size:.87rem}
.radio-line input,.check-line input{width:18px;height:18px;accent-color:var(--vw-blue);flex-shrink:0}
.hist{display:flex;justify-content:space-between;align-items:center;background:var(--card);border-radius:10px;padding:12px;margin-bottom:8px;cursor:pointer}
.hist .who{font-weight:600;font-size:.9rem}
.hist .meta{font-size:.72rem;color:var(--muted);margin-top:2px}
.hist .pt{font-size:1.25rem;font-weight:800}
.tag{display:inline-block;font-size:.68rem;padding:2px 8px;border-radius:10px;background:#141432;color:var(--muted);margin:2px 3px 0 0}
.crit{background:#3d0000;border:1px solid var(--red);border-radius:8px;padding:8px 10px;margin-bottom:6px;font-size:.85rem;display:flex;justify-content:space-between}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#00c853;color:#00300f;padding:11px 20px;border-radius:24px;font-weight:600;font-size:.85rem;opacity:0;transition:all .3s;z-index:200;box-shadow:0 4px 16px rgba(0,0,0,.5);max-width:90%;text-align:center}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:none;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--card);width:100%;max-width:520px;border-radius:16px 16px 0 0;padding:18px;max-height:88vh;overflow-y:auto}
.modal h3{display:flex;justify-content:space-between;align-items:center;font-size:1rem;margin-bottom:14px}
.modal h3 button{background:none;border:none;color:var(--muted);font-size:1.3rem;cursor:pointer}
.msec{font-size:.7rem;color:var(--muted);letter-spacing:1px;margin:14px 0 8px;font-weight:700}
.storbar{height:8px;background:#141432;border-radius:4px;overflow:hidden;margin:6px 0}
.storbar>div{height:100%;background:var(--vw-blue)}
.warn{background:#3d3a00;border:1px solid var(--yellow);color:#fff59d;border-radius:8px;padding:8px 10px;font-size:.78rem;margin-top:8px}
.timerbox{font-variant-numeric:tabular-nums;font-weight:700}
@media(min-width:600px){.kpis{grid-template-columns:repeat(4,1fr)}}
</style>
</head>
<body>
<header>
  <h1>🔍 Simulador de Auditoria Housekeeping</h1>
  <div class="hsub"><span>Fahrwerk · 2º Turno</span><span id="clock">--:--:--</span></div>
</header>

<div class="container" id="app"></div>

<div id="toast"></div>

<!-- Backup modal -->
<div class="modal-bg" id="backupModal">
  <div class="modal">
    <h3>💾 Backup do HUB <button type="button" id="closeBackup">✕</button></h3>
    <div class="msec">ARMAZENAMENTO</div>
    <div class="storbar"><div id="storFill" style="width:2%"></div></div>
    <div style="font-size:.78rem;color:var(--muted)" id="storInfo">localStorage: calculando…</div>
    <div class="warn" id="storWarn" style="display:none">⚠️ Nenhum backup realizado ainda. Recomenda-se exportar seus dados.</div>
    <div class="msec">EXPORTAR</div>
    <button type="button" class="btn btn-dark" id="btnExportJson">↓ Arquivo .json</button>
    <button type="button" class="btn btn-purple" id="btnSaveDevice">📦 Salvar no dispositivo</button>
    <div class="msec">RESTAURAR</div>
    <button type="button" class="btn btn-dark" id="btnRestoreFile">📁 De arquivo .json</button>
    <button type="button" class="btn btn-dark" id="btnRestoreDevice">📦 Do dispositivo</button>
  </div>
</div>

<input type="file" id="fileInput" accept=".json,application/json" style="display:none">
<input type="file" id="restoreInput" accept=".json,application/json" style="display:none">

<script>
'use strict';
/* ============ DADOS ============ */
const STORAGE_KEY='fahrwerk_housekeeping_v1';
const DEVICE_KEY='fahrwerk_housekeeping_device_v1';
/* ⚠️ NÚMERO DO MONITOR: coloque aqui seu WhatsApp com DDI+DDD, só dígitos. Ex: '5512987654321'
   Assim, TODOS os envios dos operadores já abrem direto na sua conversa.
   Também pode ser configurado dentro do app, no Painel do Monitor. */
const MONITOR_PHONE='';
function monitorPhone(){
 const p=(state.monitorPhone||MONITOR_PHONE||'').replace(/\D/g,'');
 return p;
}
function waUrl(text){
 const p=monitorPhone();
 return 'https://wa.me/'+(p?p:'')+'?text='+encodeURIComponent(text);
}

const DEFAULT_CATEGORIES=[{"id":"limpeza","icon":"🧹","name":"Limpeza","items":[{"n":"Parafusos e porcas no chão","m":"nivel"},{"n":"Tampinhas no chão","m":"nivel"},{"n":"Tampões no chão","m":"nivel"},{"n":"Papel no chão","m":"nivel"},{"n":"Lixo","m":"nivel"},{"n":"Sujeira","m":"nivel"},{"n":"Óleo","m":"qtd"},{"n":"Goteiras","m":"qtd"},{"n":"Peças abandonadas","m":"qtd"},{"n":"Mesa do café","m":"nivel"},{"n":"Mesa do refugo","m":"nivel"},{"n":"skillits","m":"nivel"},{"n":"Mesa da ficha","m":"nivel"},{"n":"Ventiladores","m":"nivel"},{"n":"Prateleiras","m":"nivel"},{"n":"Microondas","m":"nivel"}]},{"id":"organizacao","icon":"📦","name":"Organização","items":[{"n":"Ferramentas fora do local","m":"qtd"},{"n":"Objetos sobre prateleiras e caixas de peças","m":"qtd"},{"n":"Copos","m":"qtd"},{"n":"Garrafas","m":"qtd"},{"n":"Luvas","m":"qtd"},{"n":"Potes","m":"qtd"},{"n":"Celular carregando","m":"qtd"},{"n":"Lanches em locais inapropriado","m":"qtd"}]},{"id":"seguranca","icon":"🦺","name":"Segurança","items":[{"n":"Objetos com risco de tropeço","m":"qtd"},{"n":"Óleo no chão","m":"qtd"},{"n":"Uso de celular","m":"qtd"},{"n":"Cabelo comprido solto","m":"qtd"}]},{"id":"padronizacao","icon":"📐","name":"Padronização (desvios)","items":[{"n":"Posto desorganizado","m":"nivel"},{"n":"Materiais não identificados","m":"nivel"},{"n":"Equipamentos sujos","m":"nivel"},{"n":"Padrão de organização faixas no chão","m":"nivel"}]}];
/* Perguntas de reflexão padrão — tipos: 'radio' (uma escolha), 'check' (múltipla escolha), 'texto' (resposta livre) */
const DEFAULT_QUESTIONS=[{"id":"q1","type":"radio","text":"Quem você acredita ser o principal responsável pelos deméritos encontrados?","options":["A fábrica","O método de trabalho","Os operadores da operação","A liderança","Todos que trabalham na área","Não existe um culpado; todos somos responsáveis"]},{"id":"q2","type":"radio","text":"A maioria desses problemas poderia ter sido evitada?","options":["Sim","Não"]},{"id":"q3","type":"radio","text":"Se você trabalhasse nesta operação, deixaria o posto dessa maneira?","options":["Sim","Não"]},{"id":"q4","type":"radio","text":"Pequenas atitudes individuais podem impactar uma auditoria?","options":["Sim","Não"]},{"id":"q5","type":"texto","text":"O que mais chamou sua atenção durante a auditoria?","options":[]},{"id":"q6","type":"texto","text":"Qual foi o maior problema encontrado?","options":[]},{"id":"q7","type":"texto","text":"O que faria imediatamente para melhorar este setor?","options":[]},{"id":"q8","type":"check","text":"Manter um bom Housekeeping melhora:","options":["Segurança","Qualidade","Produtividade","Ergonomia","Clima da equipe","Todos os itens acima"]},{"id":"q1783771644896","type":"radio","text":"Housekeeping é importante?","options":["Sim","Não"]},{"id":"q1783771812595","type":"radio","text":"Qual o seu nível de comprometimento com o housekeeping?","options":["Baixo","Médio","Alto"]},{"id":"q1783771961959","type":"radio","text":"Qual avaliação vc faz do Housekeeping auditado no setor ?","options":["Ruim","Bom","Ótimo"]},{"id":"q1783772161158","type":"radio","text":"Qual foi o rigor do seu nível como auditor?","options":["Superficial","Adequada","Rigorosa"]},{"id":"q1783773064386","type":"radio","text":"Na sua avaliação, qual seria o resultado da auditoria?","options":["Aprovado","Aprovado, com melhorias a ser feitas","Reprovado"]},{"id":"q1783774896664","type":"radio","text":"Qual foi sua experiencia auditando o setor?","options":["Regular","Boa","Gostei da experiencia"]}];
function getCats(){return state.categories&&state.categories.length?state.categories:DEFAULT_CATEGORIES;}

function getQuestions(){return state.questions&&state.questions.length?state.questions:DEFAULT_QUESTIONS;}
function afterRestore(){
 if(!state.categories||!state.categories.length){
  state.categories=JSON.parse(JSON.stringify(DEFAULT_CATEGORIES));
 }
 normCats();
 ensureQuestions();
}
function ensureQuestions(){
 if(!state.questions||!state.questions.length){
  state.questions=JSON.parse(JSON.stringify(DEFAULT_QUESTIONS));
 }
 state.questions.forEach(q=>{
  if(!['radio','check','texto'].includes(q.type))q.type='texto';
  if(!Array.isArray(q.options))q.options=[];
 });
}
/* Migra itens antigos (string) para objeto {n:nome, m:'qtd'|'nivel'} — cada item tem seu próprio modo */
function normCats(){
 getCats().forEach(c=>{
  c.items=c.items.map(it=>typeof it==='string'?{n:it,m:(state.mode==='nivel'?'nivel':'qtd')}:it);
  c.items.forEach(it=>{if(it.m!=='qtd'&&it.m!=='nivel')it.m='qtd';});
 });
}
const LEVELS=[{v:0,l:'Não encontrado',s:'0'},{v:2,l:'Pouco',s:'-2'},{v:5,l:'Médio',s:'-5'},{v:10,l:'Bastante',s:'-10'}];
/* Quantidade → demérito: 0 = não encontrado, 1 = pouco (-2), 2 = médio (-5), 3+ = bastante (-10) */
function qtyToPenalty(q){return q<=0?0:q===1?2:q===2?5:10;}
function qtyLabel(q){
 if(q<=0)return{t:'Não encontrado · 0',c:'sel-0'};
 if(q===1)return{t:'Pouco · −2',c:'sel-2'};
 if(q===2)return{t:'Médio · −5',c:'sel-5'};
 return{t:'Bastante · −10',c:'sel-10'};
}

function classify(p){
 if(p>=95)return{emoji:'🟢',name:'Excelente',color:'var(--green)',desc:'O setor demonstra elevado nível de organização e disciplina.'};
 if(p>=90)return{emoji:'🟢',name:'Muito Bom',color:'var(--green)',desc:'Pequenas oportunidades de melhoria.'};
 if(p>=80)return{emoji:'🟡',name:'Bom',color:'var(--yellow)',desc:'Existem alguns desvios que precisam ser tratados.'};
 if(p>=70)return{emoji:'🟠',name:'Atenção',color:'var(--orange)',desc:'O Housekeeping precisa evoluir.'};
 return{emoji:'🔴',name:'Crítico',color:'var(--red)',desc:'O setor necessita de ações imediatas para restabelecer o padrão esperado.'};
}

/* ============ ESTADO ============ */
let state={version:1,audits:[],current:null,lastBackup:null,categories:null,mode:'nivel',questions:null,pin:'1234'}; /* mode: 'qtd' | 'nivel' */
let monitorUnlocked=false; /* desbloqueio válido apenas na sessão atual */
/* Código compacto para envio via WhatsApp (UTF-8 seguro) */
function b64enc(s){return btoa(unescape(encodeURIComponent(s)));}
function b64dec(s){return decodeURIComponent(escape(atob(s)));}
let screen='home'; // home | preview | audit | reflect | result | editor | monitor
let resultAudit=null;
let timerInt=null;

function load(){
 try{
  const raw=localStorage.getItem(STORAGE_KEY);
  if(raw){
   const d=JSON.parse(raw);
   if(d&&d.version===1){state=Object.assign(state,d);}
  }
 }catch(e){console.error('load',e);}
 if(!state.categories||!state.categories.length){
  state.categories=JSON.parse(JSON.stringify(DEFAULT_CATEGORIES));
 }
 if(state.mode!=='qtd'&&state.mode!=='nivel')state.mode='qtd';
 if(!state.pin)state.pin='1234';
 normCats();
 ensureQuestions();
 if(state.current)screen=state.current.startTs?'audit':'preview';
}
function save(){
 try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state));}catch(e){toast('⚠️ Erro ao salvar: armazenamento cheio');}
}
function toast(msg){
 const t=document.getElementById('toast');
 t.textContent=msg;t.classList.add('show');
 clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2500);
}
function fmtTime(ms){
 const s=Math.floor(ms/1000);
 return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
}
function nowHMS(){const d=new Date();return d.toLocaleTimeString('pt-BR');}

/* ============ CÁLCULO ============ */
function calc(answers,qty){
 let lost=0,nc=0;const crits=[];
 getCats().forEach(c=>c.items.forEach(it=>{
  const key=c.id+'|'+it.n;
  const v=answers[key];
  if(v===undefined)return;
  if(v>0){nc++;lost+=v;if(v>=5)crits.push({item:it.n,cat:c.name,v:v,qty:qty?qty[key]:undefined});}
 }));
 crits.sort((a,b)=>b.v-a.v);
 return{score:Math.max(0,100-lost),lost:lost,nc:nc,crits:crits};
}
function answeredCount(a){return Object.keys(a).length;}
function totalItems(){return getCats().reduce((s,c)=>s+c.items.length,0);}

/* ============ RENDER ============ */
const app=document.getElementById('app');
function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}

function render(){
 clearInterval(timerInt);
 if(screen==='home')renderHome();
 else if(screen==='preview')renderPreview();
 else if(screen==='audit')renderAudit();
 else if(screen==='reflect')renderReflect();
 else if(screen==='result')renderResult();
 else if(screen==='editor')renderEditor();
 else if(screen==='monitor')renderMonitor();
 bindCommon();
}

function renderHome(){
 const n=state.audits.length;
 const avg=n?Math.round(state.audits.reduce((s,a)=>s+a.score,0)/n):'--';
 const last=n?state.audits[n-1].score:'--';
 const avgTime=n?fmtTime(state.audits.reduce((s,a)=>s+a.durationMs,0)/n):'--:--';
 let histHtml=state.audits.slice().reverse().map(a=>{
  const cl=classify(a.score);
  return `<div class="hist" data-view="${a.id}">
    <div><div class="who">${cl.emoji} ${esc(a.auditor)}</div>
    <div class="meta">${new Date(a.date).toLocaleDateString('pt-BR')} · ${fmtTime(a.durationMs)} · ${a.nc} NC</div></div>
    <div class="pt" style="color:${cl.color}">${a.score}</div></div>`;
 }).join('')||'<div style="text-align:center;color:var(--muted);font-size:.85rem;padding:14px">Nenhuma auditoria realizada ainda. Escolha um operador e inicie a primeira!</div>';

 app.innerHTML=`
  <div class="kpis">
   <div class="kpi"><div class="ic">📋</div><div class="val">${n}</div><div class="lbl">Auditorias</div></div>
   <div class="kpi"><div class="ic">📊</div><div class="val">${avg}</div><div class="lbl">Média</div></div>
   <div class="kpi"><div class="ic">🎯</div><div class="val">${last}</div><div class="lbl">Última</div></div>
   <div class="kpi"><div class="ic">⏱️</div><div class="val" style="font-size:1.1rem;padding-top:6px">${avgTime}</div><div class="lbl">Tempo médio</div></div>
  </div>
  <div class="card">
   <label class="f">Nome do operador auditor</label>
   <input type="text" id="auditorName" placeholder="Ex: João Silva" autocomplete="off">
   <label class="f">Sub-setor auditado (opcional)</label>
   <input type="text" id="subSector" placeholder="Ex: Eixo dianteiro" autocomplete="off">
   <div style="font-size:.75rem;color:var(--muted);margin-bottom:10px">Modo de avaliação: <b style="color:var(--text)">definido item a item</b> (🔢 quantidade ou 🎯 nível) · configuração no Painel do Monitor</div>
   <button type="button" class="btn btn-primary" id="btnStart">👀 Ver itens e preparar auditoria</button>
  </div>
  <div class="row">
   <button type="button" class="btn btn-dark" id="btnAtualizar">🔄 Atualizar</button>
   <button type="button" class="btn btn-dark" id="btnBackup">💾 Backup</button>
   <button type="button" class="btn btn-green" id="btnWhats">📲 WhatsApp</button>
  </div>
  <button type="button" class="btn btn-purple" id="btnMonitor">🔐 Painel do Monitor</button>
  <div class="cat-title">📜 Histórico <span class="bar"></span></div>
  ${histHtml}`;

 const bs=document.getElementById('btnStart');
 bs.addEventListener('click',()=>{
  const name=document.getElementById('auditorName').value.trim();
  if(!name){toast('⚠️ Informe o nome do auditor');return;}
  state.current={id:'a'+Date.now(),auditor:name,sub:document.getElementById('subSector').value.trim(),startTs:null,answers:{},qty:{},reflections:{}};
  save();screen='preview';render();
 });

/* ============ PAINEL DO MONITOR ============ */
function importCodes(text){
 const re=/HK1\|([A-Za-z0-9+/=]+)/g;
 let m,found=0,added=0,dup=0,err=0;
 const ids=new Set(state.audits.map(a=>a.id));
 while((m=re.exec(text))!==null){
  found++;
  try{
   const a=JSON.parse(b64dec(m[1]));
   if(!a||!a.id||typeof a.score!=='number')throw new Error('inválido');
   if(ids.has(a.id)){dup++;continue;}
   ids.add(a.id);
   state.audits.push(a);added++;
  }catch(e){err++;}
 }
 state.audits.sort((x,y)=>new Date(x.date)-new Date(y.date));
 if(added)save();
 return{found,added,dup,err};
}

function renderMonitor(){

 const avg=n?Math.round(state.audits.reduce((s,a)=>s+a.score,0)/n):'--';

 const byAud={};
 state.audits.forEach(a=>{
  if(!byAud[a.auditor])byAud[a.auditor]={n:0,sum:0};
  byAud[a.auditor].n++;byAud[a.auditor].sum+=a.score;
 });
 const rank=Object.keys(byAud).map(k=>({name:k,n:byAud[k].n,avg:Math.round(byAud[k].sum/byAud[k].n)})).sort((a,b)=>b.n-a.n||b.avg-a.avg);
 const rankHtml=rank.length?rank.map((r0,i)=>`<div class="hist" style="cursor:default"><div><div class="who">${i===0?'🥇':i===1?'🥈':i===2?'🥉':'👤'} ${esc(r0.name)}</div><div class="meta">${r0.n} auditoria(s)</div></div><div style="display:flex;align-items:center;gap:10px"><div class="pt" style="color:${classify(r0.avg).color}">${r0.avg}</div><button type="button" class="opt mon-delaud" data-aud="${esc(r0.name)}" style="width:44px;padding:8px 2px;color:#ff8a80"><b>🗑️</b></button></div></div>`).join(''):'<div style="color:var(--muted);font-size:.85rem">Sem auditorias ainda.</div>';

   if(v===undefined)return;
   const arr=Array.isArray(v)?v:[v];
   arr.forEach(o=>{counts[o]=(counts[o]||0)+1;total++;});
  });
  if(!total)return;
  qHtml+=`<div class="card"><div style="font-size:.85rem;font-weight:600;margin-bottom:8px">${qi0+1}. ${esc(q.text)}</div>`;
  Object.keys(counts).sort((a,b)=>counts[b]-counts[a]).forEach(o=>{

  });
  qHtml+=`</div>`;
 });
 if(!qHtml)qHtml='<div class="card" style="color:var(--muted);font-size:.85rem">As análises das perguntas de reflexão aparecem aqui conforme as auditorias são importadas.</div>';

 /* respostas livres recentes */

 });

 let html=`

  }else if(q.type==='check'){
   html+=q.options.map(o=>`<label class="check-line"><input type="checkbox" name="${esc(q.id)}" value="${esc(o)}" ${(r[q.id]||[]).includes(o)?'checked':''}><span>${esc(o)}</span></label>`).join('');
  }else{
   html+=`<textarea class="rf-text" data-qid="${esc(q.id)}" placeholder="Resposta livre...">${esc(r[q.id]||'')}</textarea>`;
  }
  html+=`</div>`;
 });

 function collect(){
  qs.forEach(q=>{
   if(q.type==='radio'){
    const sel=app.querySelector(`input[name="${q.id}"]:checked`);
    if(sel)r[q.id]=sel.value;
   }else if(q.type==='check'){
    r[q.id]=Array.from(app.querySelectorAll(`input[name="${q.id}"]:checked`)).map(c=>c.value);
   }else{
    const t=app.querySelector(`.rf-text[data-qid="${q.id}"]`);
    if(t)r[q.id]=t.value;
   }
  });
 }

  el.addEventListener('change',()=>{collect();save();});
 });

function mergeAudits(imported){
 if(!imported||!Array.isArray(imported.audits))return 0;
 const ids=new Set(state.audits.map(a=>a.id));
 let added=0;
 imported.audits.forEach(a=>{if(a&&a.id&&!ids.has(a.id)){state.audits.push(a);added++;}});
 state.audits.sort((x,y)=>new Date(x.date)-new Date(y.date));
 return added;
}

  }catch(e){toast('⚠️ Arquivo .json inválido');}
 };
 rd.readAsText(f);
});
document.getElementById('btnRestoreDevice').addEventListener('click',()=>{
 try{
  const raw=localStorage.getItem(DEVICE_KEY);
  if(!raw){toast('⚠️ Nenhum backup no dispositivo');return;}
  const d=JSON.parse(raw);
  if(!confirm(`Restaurar backup do dispositivo com ${(d.audits||[]).length} auditoria(s)?`))return;
  state=Object.assign({version:1,audits:[],current:null,lastBackup:null,categories:null,mode:'qtd',questions:null,pin:'1234'},d);
  afterRestore();save();document.getElementById('backupModal').classList.remove('open');
  screen=state.current?'audit':'home';render();
  toast('✅ Restaurado do dispositivo');
 }catch(e){toast('⚠️ Backup do dispositivo inválido');}
});

/* ============ RELÓGIO ============ */
setInterval(()=>{document.getElementById('clock').textContent=nowHMS();},1000);
document.getElementById('clock').textContent=nowHMS();

/* ============ INIT ============ */
load();
render();
</script>
